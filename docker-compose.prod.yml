# ─── Prod docker compose ──────────────────────────────────────────────────────
# Запуск:    docker compose -f docker-compose.prod.yml up -d --build
# Стоп:      docker compose -f docker-compose.prod.yml down
#
# Архитектура:
#   - Внешний порт открыт только у frontend (nginx) → 80
#   - Все остальные сервисы (manager, workers, postgres, minio) — internal-only
#   - frontend контейнер собирает Vite-bundle, отдаёт статику через nginx
#     и проксирует /api → manager:3000 (см. nginx/nginx.conf).
#
# Перед запуском задайте секреты через .env (см. .env.example) — иначе будут
# использованы небезопасные дефолты.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-diploma}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-diploma}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [asteroid-net]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [asteroid-net]

  manager:
    build:
      context: ./asteroid_backend
      dockerfile: Dockerfile
      args:
        SERVICE_SCRIPT: src/manager/app.js
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      worker-js:
        condition: service_started
      worker-ts:
        condition: service_started
      worker-py:
        condition: service_started
    environment:
      PORT: 3000
      MANAGER_PUBLIC_URL: ${MANAGER_PUBLIC_URL:-http://manager:3000}
      WORKER_JS_URL: http://worker-js:4001
      WORKER_TS_URL: http://worker-ts:4002
      WORKER_PY_URL: http://worker-py:4003
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_SOURCE_BUCKET: preprocessed
      MINIO_RESULT_BUCKET: processed-files
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-diploma}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MAX_POOL_SIZE: 10
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET required}
      JWT_ACCESS_TTL_SECONDS: 900
      JWT_REFRESH_TTL_SECONDS: 2592000
      JWT_REFRESH_COOKIE_NAME: refreshToken
      JWT_COOKIE_SECURE: ${JWT_COOKIE_SECURE:-true}
      JWT_COOKIE_DOMAIN: ${JWT_COOKIE_DOMAIN:-}
      DEFAULT_AVATAR_BASE_URL: ${DEFAULT_AVATAR_BASE_URL:-https://cdn.example.com/avatars}
    restart: unless-stopped
    networks: [asteroid-net]

  worker-js:
    build:
      context: ./asteroid_backend
      dockerfile: Dockerfile
      args:
        SERVICE_SCRIPT: src/workers/js/app.js
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_SOURCE_BUCKET: preprocessed
      MINIO_RESULT_BUCKET: processed-files
    restart: unless-stopped
    networks: [asteroid-net]

  worker-ts:
    build:
      context: ./asteroid_backend
      dockerfile: Dockerfile
      args:
        SERVICE_SCRIPT: src/workers/typescript/app.js
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_SOURCE_BUCKET: preprocessed
      MINIO_RESULT_BUCKET: processed-files
    restart: unless-stopped
    networks: [asteroid-net]

  worker-py:
    build:
      context: ./asteroid_backend
      dockerfile: Dockerfile.python
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_SOURCE_BUCKET: preprocessed
      MINIO_RESULT_BUCKET: processed-files
      WORKER_PY_PORT: 4003
    restart: unless-stopped
    networks: [asteroid-net]

  frontend:
    build:
      context: ./asteroid-front
      dockerfile: Dockerfile
    depends_on:
      - manager
    # Конфиг nginx внешний — можно править без пересборки образа.
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${FRONTEND_HTTP_PORT:-80}:80"
    restart: unless-stopped
    networks: [asteroid-net]

volumes:
  postgres-data:
  minio-data:

networks:
  asteroid-net:
    driver: bridge
