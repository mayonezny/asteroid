# nginx-конфиг для прод-окружения.
# Раздача собранного фронта + reverse-proxy к manager:3000.
# Этот файл монтируется в frontend-контейнер как /etc/nginx/conf.d/default.conf
# (см. docker-compose.prod.yml).

upstream manager_upstream {
    server manager:3000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Лимит на upload-ы (в .env: max_body_size = MAX_FILE_SIZE_BYTES = 10 МБ
    # на стороне express, плюс архивы до 500 МБ распаковываются на клиенте).
    client_max_body_size 600M;

    # Заголовки безопасности и кэширования
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml application/wasm image/svg+xml;
    gzip_min_length 1024;

    # ─── Прокси на backend manager ────────────────────────────────────────────
    location /api/ {
        proxy_pass http://manager_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Длинные long-poll запросы (research status). 60s достаточно.
        proxy_read_timeout 65s;
        proxy_send_timeout 65s;
        proxy_buffering off;
    }

    # Опциональное превью графа от backend (SSR HTML)
    location = /graph {
        proxy_pass http://manager_upstream/graph;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ─── Статика фронта с SPA-fallback'ом ─────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Хэшированные ассеты — длинный кэш
    location ~* \.(?:js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|webp|ico|map)$ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Все остальные пути → index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store" always;
    }
}
