# nginx-конфиг поддомена dipl.vizhu.su
# Живёт в ~/vizhu/infra/nginx/conf.d/ и монтируется в сервисный nginx-контейнер.
#
# Архитектура:
#   internet → этот файл (SSL-терминация, certbot) →
#   → host.docker.internal:8080 (asteroid frontend контейнер) →
#   → manager:3000 (для /api/*)
#
# Порт 8080 задаётся через FRONTEND_HTTP_PORT в ~/asteroid/.env
# После изменения: nginx -s reload (или docker compose exec nginx nginx -s reload)

upstream asteroid_app {
    server host.docker.internal:8080;
    keepalive 4;
}

# HTTP → HTTPS редирект
server {
    listen 80;
    listen [::]:80;
    server_name dipl.vizhu.su;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dipl.vizhu.su;

    ssl_certificate     /etc/letsencrypt/live/dipl.vizhu.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dipl.vizhu.su/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Лимит для загрузки файлов на анализ (matcher'у pass-through до asteroid nginx)
    client_max_body_size 600M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass         http://asteroid_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Для долгих запросов (status polling, большие аплоады)
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }
}
